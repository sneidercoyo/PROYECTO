{% extends 'base.html' %}{% load static %}{% block title %}Editar Perfil — Artesano{% endblock %}
{% block content %}<div style="max-width:700px;margin:0 auto;padding:2rem 1rem;">
<h1 style="font-size:1.8rem;color:#2c1810;margin-bottom:0.5rem;"><i class="bi bi-pencil"></i> Editar Perfil</h1>
<p style="color:#8a7a6b;margin-bottom:1.5rem;">Actualiza tu información personal y de artesano</p>
<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;">
<a href="{% url 'artisan_dashboard' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#fff;color:#2c1810;border:1px solid #e8ddd4;"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="{% url 'artisan_profile' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#fff;color:#2c1810;border:1px solid #e8ddd4;"><i class="bi bi-person"></i> Mi Perfil</a>
<a href="{% url 'artisan_edit_profile' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#c75c2e;color:#fff;"><i class="bi bi-pencil"></i> Editar Perfil</a></div>
<div style="background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e8ddd4;">
{% if artisan.image %}<div style="text-align:center;margin-bottom:1.5rem;"><img src="{{ artisan.image.url }}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #c75c2e;"></div>{% endif %}
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Nombre completo *</label><input type="text" name="name" value="{{ artisan.name }}" required style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Especialidad</label><input type="text" name="specialty" value="{{ artisan.specialty }}" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Biografía</label><textarea name="bio" rows="5" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;resize:vertical;">{{ artisan.bio }}</textarea></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Foto de perfil</label><input type="file" name="image" accept="image/*" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Correo electrónico</label><input type="email" name="email" value="{{ user.email|default:'' }}" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Teléfono</label><input type="text" name="phone" value="{{ user.phone }}" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Ciudad</label><input type="text" name="city" value="{{ user.city }}" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div></div>
<div style="margin-bottom:1.5rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Dirección</label><textarea name="address" rows="2" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;resize:vertical;">{{ user.address }}</textarea></div>
<label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin-bottom:1.5rem;"><input type="checkbox" name="active" {% if artisan.active %}checked{% endif %}> <span style="font-size:0.9rem;">Perfil activo en la tienda</span></label>
<button type="submit" style="width:100%;padding:0.9rem;background:#c75c2e;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;"><i class="bi bi-check-lg"></i> Guardar Cambios</button></form></div></div>{% endblock %}
