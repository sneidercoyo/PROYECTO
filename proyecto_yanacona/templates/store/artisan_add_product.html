{% extends 'base.html' %}{% load static %}{% block title %}Nuevo Producto — Artesano{% endblock %}
{% block content %}<div style="max-width:700px;margin:0 auto;padding:2rem 1rem;">
<h1 style="font-size:1.8rem;color:#2c1810;margin-bottom:0.5rem;"><i class="bi bi-plus-lg"></i> Nuevo Producto</h1>
<p style="color:#8a7a6b;margin-bottom:1.5rem;">Agrega un producto a tu catálogo</p>
<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;">
<a href="{% url 'artisan_dashboard' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#fff;color:#2c1810;border:1px solid #e8ddd4;"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="{% url 'artisan_products' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#fff;color:#2c1810;border:1px solid #e8ddd4;"><i class="bi bi-box-seam"></i> Mis Productos</a>
<a href="{% url 'artisan_add_product' %}" style="padding:0.7rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:0.9rem;background:#c75c2e;color:#fff;"><i class="bi bi-plus-lg"></i> Nuevo Producto</a></div>
<div style="background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e8ddd4;">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Nombre del producto *</label><input type="text" name="name" required style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Slug (URL)</label><input type="text" name="slug" placeholder="Se genera automático si se deja vacío" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Descripción</label><textarea name="description" rows="4" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;resize:vertical;"></textarea></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Precio (COP) *</label><input type="number" name="price" required min="0" step="0.01" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Precio de descuento</label><input type="number" name="discount_price" min="0" step="0.01" placeholder="Dejar vacío si no aplica" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Stock *</label><input type="number" name="stock" required min="0" value="0" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Categoría</label><select name="category" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"><option value="">Sin categoría</option>{% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}</select></div></div>
<div style="margin-bottom:1rem;"><label style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;">Imagen del producto</label><input type="file" name="image" accept="image/*" style="width:100%;padding:0.7rem;border:1px solid #e8ddd4;border-radius:8px;font-size:0.95rem;"></div>
<div style="display:flex;gap:1.5rem;margin-bottom:1.5rem;">
<label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;"><input type="checkbox" name="featured"> <span style="font-size:0.9rem;">Destacar en tienda</span></label>
<label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;"><input type="checkbox" name="active" checked> <span style="font-size:0.9rem;">Activo</span></label></div>
<button type="submit" style="width:100%;padding:0.9rem;background:#c75c2e;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;"><i class="bi bi-plus-lg"></i> Crear Producto</button>
</form></div></div>{% endblock %}
